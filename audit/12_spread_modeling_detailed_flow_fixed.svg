<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1900" viewBox="0 0 2400 1900">
<defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#27364a" />
            </marker>
            <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#155fc0" />
            </marker>
            <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#15803d" />
            </marker>
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
              <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
            </filter>
        </defs>
<rect x="0" y="0" width="2400" height="1900" fill="#fbfcff"/>
<text x="40" y="58" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">02. Дорожки вызовов внутри /the_spread_of_epidemics и /modeling</text>
<rect x="50" y="110" width="660" height="70" rx="16" fill="#ffffff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<rect x="50" y="110" width="660" height="42" rx="16" fill="#1d4ed8"/>
<rect x="50" y="136" width="660" height="16" fill="#1d4ed8"/>
<text x="380.0" y="138" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">/the_spread_of_epidemics</text>
<rect x="770" y="110" width="660" height="70" rx="16" fill="#ffffff" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
<rect x="770" y="110" width="660" height="42" rx="16" fill="#15803d"/>
<rect x="770" y="136" width="660" height="16" fill="#15803d"/>
<text x="1100.0" y="138" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">/modeling</text>
<rect x="1500" y="110" width="830" height="70" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<rect x="1500" y="110" width="830" height="42" rx="16" fill="#7c3aed"/>
<rect x="1500" y="136" width="830" height="16" fill="#7c3aed"/>
<text x="1915.0" y="138" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">server.app.covid19-modeling / index.js</text>
<rect x="70" y="210" width="610" height="120" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="238" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">1. Открыть страницу</text>
<text x="88" y="261" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">The_spread_of_epidemics.js монтируется, загружается UI.</text>
<line x1="375" y1="330" x2="375" y2="355" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="70" y="355" width="610" height="120" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="383" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">2. Нажать «Описание модели»</text>
<text x="88" y="406" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">setOpen(!open) — локальное сворачивание/разворачивание без</text>
<text x="88" y="429" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">сервера.</text>
<line x1="375" y1="475" x2="375" y2="500" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="70" y="500" width="610" height="120" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="528" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">3. Нажать внешние ссылки</text>
<text x="88" y="551" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">ScienceDirect / arXiv / Covasim docs — открываются внешние</text>
<text x="88" y="574" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">страницы.</text>
<line x1="375" y1="620" x2="375" y2="645" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="70" y="645" width="610" height="135" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="673" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">4. Выбрать регион</text>
<text x="88" y="696" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">selectedRegion onChange → setRegion_data / setRegion_name</text>
<text x="88" y="719" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">/ setPopulation_data. 1=Новосибирская область, 2=Омская</text>
<text x="88" y="742" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">область, else=Алтайский край.</text>
<line x1="375" y1="780" x2="375" y2="805" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="70" y="805" width="610" height="120" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="833" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">5. Нажать «Запустить»</text>
<text x="88" y="856" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">run_msim_(e) → POST /data → POST /getUMsim2 → POST</text>
<text x="88" y="879" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">/api/curData.</text>
<line x1="375" y1="925" x2="375" y2="950" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="70" y="950" width="610" height="120" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="978" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">6. Нажать «Показать данные»</text>
<text x="88" y="1001" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">real_data1..real_data10 → подмешивание реальных данных из</text>
<text x="88" y="1024" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">cov_* массивов.</text>
<line x1="375" y1="1070" x2="375" y2="1095" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="70" y="1095" width="610" height="120" rx="16" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="1123" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">7. Zoom / download графика</text>
<text x="88" y="1146" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">zoom_chart / download_chart — локально, без backend.</text>
<rect x="790" y="210" width="610" height="120" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
<text x="808" y="238" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">1. Открыть страницу</text>
<text x="808" y="261" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">Modeling.js монтируется, загружается UI.</text>
<line x1="1095" y1="330" x2="1095" y2="355" stroke="#15803d" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="790" y="355" width="610" height="120" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
<text x="808" y="383" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">2. Открыть материалы</text>
<text x="808" y="406" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">ScienceDirect / arXiv / Covasim docs / article.pdf.</text>
<line x1="1095" y1="475" x2="1095" y2="500" stroke="#15803d" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="790" y="500" width="610" height="130" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
<text x="808" y="528" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">3. Нажать «Запустить»</text>
<text x="808" y="551" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">run_msim_(e) → POST /data → POST /getUMsim2 → POST</text>
<text x="808" y="574" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">/api/curData → возможно GET /getMsim.</text>
<line x1="1095" y1="630" x2="1095" y2="655" stroke="#15803d" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="790" y="655" width="610" height="120" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
<text x="808" y="683" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">4. Нажать «Показать данные»</text>
<text x="808" y="706" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">real_data1..real_data10 → реальные данные накладываются на</text>
<text x="808" y="729" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">модельные графики.</text>
<line x1="1095" y1="775" x2="1095" y2="800" stroke="#15803d" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="790" y="800" width="610" height="120" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
<text x="808" y="828" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">5. Управление графиками</text>
<text x="808" y="851" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">zoom_chart / download_chart — локально.</text>
<line x1="1095" y1="920" x2="1095" y2="945" stroke="#15803d" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="790" y="945" width="610" height="120" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
<text x="808" y="973" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">6. Перейти в SEIR-HCD</text>
<text x="808" y="996" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">внутренний блок/компонент ModelingSEIR_HCD.js.</text>
<rect x="1520" y="220" width="760" height="160" rx="16" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="1538" y="250" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#7c3aed" text-anchor="start">POST /data</text>
<text x="1538" y="282" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">run_model(...) → выбрать slug региона (1→novosibirsk, 2→omsk, else→altay) → скачать CSV:</text>
<text x="1538" y="305" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">ai-biolab.ru/data/&lt;region&gt;-region-data.csv → neatCsv → записать curData&lt;region_num&gt;.json →</text>
<text x="1538" y="328" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">spawn python3.10 ./dlya_kati.py → response ok</text>
<rect x="1520" y="410" width="760" height="120" rx="16" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="1538" y="440" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#7c3aed" text-anchor="start">POST /getUMsim2</text>
<text x="1538" y="472" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">прочитать users_msim_res_&lt;region&gt;_&lt;population&gt;_&lt;init_inf&gt;_&lt;n_future_day&gt;_&lt;date&gt;.json →</text>
<text x="1538" y="495" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">отправить JSON результата</text>
<rect x="1520" y="560" width="760" height="120" rx="16" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="1538" y="590" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#7c3aed" text-anchor="start">GET /getMsim</text>
<text x="1538" y="622" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">прочитать ./msim_res.json → отправить JSON базового результата</text>
<rect x="1520" y="710" width="760" height="120" rx="16" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="1538" y="740" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#7c3aed" text-anchor="start">POST /api/curData</text>
<text x="1538" y="772" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">прочитать ./curData&lt;region_data&gt;.json → отправить текущие данные региона</text>
<rect x="1520" y="860" width="760" height="120" rx="16" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="1538" y="890" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#7c3aed" text-anchor="start">GET /article</text>
<text x="1538" y="922" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#111827" text-anchor="start">res.download(&#x27;./modeling_article.pdf&#x27;)</text>
<polyline points="680,820 1450,820 1450,300 1520,300" fill="none" stroke="#27364a" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1400,600 1450,600 1450,300 1520,300" fill="none" stroke="#27364a" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1400,600 1450,600 1450,490 1520,490" fill="none" stroke="#27364a" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1400,600 1450,600 1450,760 1520,760" fill="none" stroke="#27364a" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="70" y="1360" width="960" height="180" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="1390" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#2563eb" text-anchor="start">Данные графиков во фронте</text>
<text x="88" y="1422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Локальные массивы графиков (оба раздела):</text>
<text x="88" y="1446" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">cov_data, cov_nd, cov_nd_high, cov_nd_state, cov_data_state, cov_cum_diag,</text>
<text x="88" y="1470" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">cov_cum_diag_high, cov_new_death, cov_new_death_high, cov_new_rec, cov_new_rec_high,</text>
<text x="88" y="1494" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">cov_new_crit, cov_new_crit_high.</text>
<rect x="1080" y="1360" width="620" height="180" rx="16" fill="#fff1f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
<text x="1098" y="1390" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#dc2626" text-anchor="start">⚠ /api/csvCovid/nd</text>
<text x="1098" y="1422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Фронт содержит reference на /api/csvCovid/nd. В текущем</text>
<text x="1098" y="1446" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">публичном index.js точная route не найдена. Есть /api/csvCovid и</text>
<text x="1098" y="1470" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">/api/csvCovid/&lt;region&gt;.</text>
<rect x="1740" y="1360" width="520" height="220" rx="16" fill="#ffffff" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
<text x="1758" y="1390" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#64748b" text-anchor="start">Материалы</text>
<text x="1758" y="1422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Внешние ссылки: ScienceDirect, arXiv, Covasim docs.</text>
<text x="1758" y="1446" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Файл /article отдаёт modeling_article.pdf. На страницах</text>
<text x="1758" y="1470" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">также используются иллюстрации scenario.png /</text>
<text x="1758" y="1494" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">article.pdf и графики Chart.js.</text>
</svg>