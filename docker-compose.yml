services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_biolab}
      POSTGRES_USER: ${POSTGRES_USER:-ai_biolab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_biolab}
    ports:
      - "${POSTGRES_PORT:-15433}:5432"
    volumes:
      # PG 18 хранит данные в /var/lib/postgresql/<major>/docker;
      # монтируем родительский каталог, чтобы поддерживать pg_upgrade.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_biolab} -d ${POSTGRES_DB:-ai_biolab}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_biolab}:${POSTGRES_PASSWORD:-ai_biolab}@db:5432/${POSTGRES_DB:-ai_biolab}
      MOCK_DATA_DIR: mock_data
    # Последовательность инициализации:
    #   1. init_db                          — создание схемы (CREATE TABLE IF NOT EXISTS)
    #   2. import_mock_data_to_db           — Анины моки (agent/ml/mfg config + result JSONs)
    #   3. seed_all                         — наши справочники: regions (75), region_timeseries (3 CSV), seir_params
    #   4. import_mfg_scenarios_to_db       — MFG-сценарии из data_to_import/ (16 CSV SEIR-HCD по 4 periods × 4 strategies)
    # Все шаги идемпотентны (ON CONFLICT DO NOTHING / проверка SHA-256), безопасно повторять.
    command: >
      sh -c "python scripts/init_db.py &&
             python scripts/import_mock_data_to_db.py &&
             python scripts/seed_all.py &&
             python scripts/import_mfg_scenarios_to_db.py --input-dir /data_to_import --region-id novosibirsk_oblast"
    volumes:
      - ./backend/mock_data:/app/mock_data:ro
      - ./data_to_import:/data_to_import
      - ./data:/data:ro
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_biolab}:${POSTGRES_PASSWORD:-ai_biolab}@db:5432/${POSTGRES_DB:-ai_biolab}
      MOCK_DATA_DIR: mock_data
      GENERATED_DIR: /app/generated
      CGAN_DATA_DIR: /data/cgan
      CGAN_N_TRAJECTORIES: ${CGAN_N_TRAJECTORIES:-100}
      AGENT_START_DAY: ${AGENT_START_DAY:-2020-03-12}
      AGENT_RAND_SEED: ${AGENT_RAND_SEED:-1}
      AGENT_MODEL_VERSION: ${AGENT_MODEL_VERSION:-covasim-3.1.8-adapter-1}
      AGENT_MAX_INTERVENTIONS: ${AGENT_MAX_INTERVENTIONS:-50}
      MOCK_SLEEP_SECONDS: ${MOCK_SLEEP_SECONDS:-3}
      MAX_PARALLEL_RUNS: ${MAX_PARALLEL_RUNS:-2}
      MAX_QUEUE_SIZE: ${MAX_QUEUE_SIZE:-10}
      SECURE_COOKIE: ${SECURE_COOKIE:-false}
    ports:
      - "${API_PORT:-8001}:8000"
    volumes:
      - ./backend/mock_data:/app/mock_data:ro
      - ./backend/generated:/app/generated
      - ./data_to_import:/data_to_import
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8001}
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: "0"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
    name: ai_biolab_anna_pg18_data
  frontend_node_modules:
