events {}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream sharelatex {
        zone sharelatex_dns 64k;
        server sharelatex:80 resolve;
    }

    upstream ai_biolab_frontend {
        zone ai_biolab_frontend_dns 64k;
        server ai-biolab-frontend:80 resolve;
    }

    upstream ai_biolab_api {
        zone ai_biolab_api_dns 64k;
        server ai-biolab-api:8000 resolve;
    }

    # Неизвестные домены не отправляем ни в Overleaf, ни в AI Biolab.
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # Overleaf HTTP -> HTTPS.
    server {
        listen 80;
        server_name overleaf.covid19-modeling.ru;

        return 301 https://overleaf.covid19-modeling.ru$request_uri;
    }

    # AI Biolab HTTP:
    # challenge оставляем доступным для продления сертификата,
    # всё остальное отправляем на основной HTTPS-домен.
    server {
        listen 80;
        server_name ai-biolab.ru www.ai-biolab.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://ai-biolab.ru$request_uri;
        }
    }

    # Overleaf HTTPS: параметры сохранены из действующего конфига.
    server {
        listen 443 ssl;
        server_name overleaf.covid19-modeling.ru;

        ssl_certificate      /certs/nginx_certificate.pem;
        ssl_certificate_key  /certs/nginx_key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubdomains;";

        server_tokens off;
        client_max_body_size 50M;

        location / {
            proxy_pass http://sharelatex;

            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3m;
            proxy_send_timeout 3m;
        }
    }

    # Основной сайт AI Biolab.
    server {
        listen 443 ssl;
        server_name ai-biolab.ru;

        ssl_certificate      /etc/letsencrypt/live/ai-biolab.ru/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/ai-biolab.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000" always;

        server_tokens off;
        client_max_body_size 50M;

        location /api/ {
            # Без завершающего "/" — префикс /api сохраняется.
            proxy_pass http://ai_biolab_api;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3m;
            proxy_send_timeout 3m;
        }

        location / {
            proxy_pass http://ai_biolab_frontend;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3m;
            proxy_send_timeout 3m;
        }
    }

    # www оставляем рабочим, но приводим к одному каноническому адресу.
    server {
        listen 443 ssl;
        server_name www.ai-biolab.ru;

        ssl_certificate      /etc/letsencrypt/live/ai-biolab.ru/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/ai-biolab.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://ai-biolab.ru$request_uri;
    }
}
