server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # --- Проксирование API на бэкенд ---
    # Нужно для АВТОНОМНОГО запуска по IP (compose.ip.yml), где этот nginx —
    # единственная точка входа и сам отдаёт и статику, и /api.
    # В доменном режиме (compose.prod.yml) запросы /api перехватывает внешний
    # nginx Overleaf ДО фронтенда, поэтому этот блок там просто не задействуется
    # (фронт получает только не-/api запросы). Добавление безопасно для обоих режимов.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $ai_api_upstream api:8000;
        proxy_pass http://$ai_api_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3m;
        proxy_send_timeout 3m;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Прямое открытие React Router-маршрутов:
    # /modeling, /the_spread_of_epidemics и т. п.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|pdf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
