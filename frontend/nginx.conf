# Раздаёт собранный фронт (SPA) и проксирует /api/ на бэкенд.
# Это единственный контейнер, который смотрит наружу (порт 80).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml application/xml+rss image/svg+xml;

    # API + скачивание артефактов (всё под /api/, в т.ч. forecast_csv) → бэкенд.
    # Имя upstream резолвим через встроенный DNS Docker (127.0.0.11),
    # чтобы пересоздание контейнера api не ловило устаревший IP.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ML/CGAN-запросы бывают длинными — поднимаем таймауты.
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # Кеш для хешированных ассетов CRA (имена с контент-хешем).
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA-роутинг react-router: всё остальное отдаём в index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
